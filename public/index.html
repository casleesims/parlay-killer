<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Parlay Killer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --s1:       #111111;
      --s2:       #161616;
      --s3:       #1c1c1c;
      --border:   #222222;
      --border2:  #2a2a2a;
      --primary:  #860038;
      --over:     #39ff14;
      --under:    #860038;
      --toss:     #f5a623;
      --white:    #ffffff;
      --dim:      #888888;
      --muted:    #444444;
      --font:     'Inter', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      height: 100%;
      overflow: hidden;
    }

    /* ── Screens ─────────────────────────────────────────── */
    .screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .screen.hidden { transform: translateX(100%); pointer-events: none; }
    .screen.slide-left { transform: translateX(-30%); pointer-events: none; }

    /* ── Top Nav ─────────────────────────────────────────── */
    .top-nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .nav-logo {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1;
    }
    .nav-logo span { color: var(--primary); }
    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--white);
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }
    .nav-back svg { flex-shrink: 0; }
    .nav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--white);
      cursor: pointer;
      border: 2px solid var(--primary);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ── Bottom Nav ──────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: stretch;
      background: var(--s1);
      border-top: 1px solid var(--border);
      height: 56px;
      z-index: 100;
    }
    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: color 0.15s;
    }
    .bottom-nav-item.active { color: var(--primary); }
    .bottom-nav-item svg { stroke: currentColor; }

    /* ── Scrollable body area ────────────────────────────── */
    .screen-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 56px; /* reserve space for fixed bottom nav */
    }

    /* ── Live badge ──────────────────────────────────────── */
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--over);
      text-transform: uppercase;
    }
    .live-dot::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--over);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Game Strips (Home Screen) ───────────────────────── */
    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 16px 16px 8px;
    }
    .game-strip {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      gap: 0;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .game-strip:active { background: var(--s2); }
    .team-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .team-col.right { align-items: flex-end; }
    .team-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
    }
    .team-abbr {
      font-size: 11px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.08em;
    }
    .score-col {
      width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .score-line {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--white);
      font-variant-numeric: tabular-nums;
    }
    .score-sep {
      font-size: 1rem;
      color: var(--muted);
    }
    .game-status {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--dim);
      text-transform: uppercase;
    }
    .game-status.live { color: var(--over); }

    /* ── Box Score Screen ────────────────────────────────── */
    .score-header {
      padding: 0;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .score-matchup {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 8px;
    }
    .score-team-left { text-align: left; }
    .score-team-right { text-align: right; }
    .score-abbr {
      font-size: 11px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .score-num {
      font-size: 38px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .score-record {
      font-size: 8px;
      color: #444;
      margin-top: 2px;
    }
    .score-center {
      text-align: center;
      padding: 0 4px;
    }
    .score-period {
      font-size: 11px;
      font-weight: 900;
      color: #860038;
      letter-spacing: 0.06em;
    }
    .score-clock {
      font-size: 10px;
      color: #555;
      margin-top: 3px;
    }
    .score-live-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #860038;
      padding: 2px 7px;
      font-size: 8px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.1em;
      margin-top: 5px;
    }
    .quarter-chart {
      display: flex;
      gap: 2px;
      margin-top: 8px;
    }
    .qtr-block {
      flex: 1;
      height: 28px;
      background: var(--s3);
      border-radius: 2px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      position: relative;
    }
    .qtr-fill {
      width: 100%;
      background: var(--primary);
      transition: height 0.4s ease;
    }
    .qtr-fill.away { background: var(--s2); border: 1px solid var(--border2); }
    .qtr-label {
      font-size: 0.6rem;
      color: var(--dim);
      text-align: center;
      margin-top: 3px;
    }

    /* ── Player Table ────────────────────────────────────── */
    .player-table-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--s1);
      flex-shrink: 0;
    }
    .ptab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: var(--font);
      transition: color 0.15s, border-color 0.15s;
    }
    .ptab.active { color: var(--white); border-bottom-color: var(--primary); }

    .player-row {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      gap: 12px;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .player-row:active { background: var(--s2); }
    .player-num {
      font-size: 0.7rem;
      color: var(--muted);
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }
    .player-info { flex: 1; min-width: 0; }
    .player-row-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-row-pos {
      font-size: 0.65rem;
      color: var(--dim);
    }
    .player-stats-mini {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .mini-stat {
      text-align: center;
      min-width: 28px;
    }
    .mini-stat-val {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--white);
    }
    .mini-stat-lbl {
      font-size: 0.55rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .sparkline-wrap {
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* ── Player Card Screen ──────────────────────────────── */
    .player-card-header {
      position: relative;
      overflow: hidden;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
    }
    .player-color-stripe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }
    .player-card-body {
      display: flex;
      align-items: flex-end;
      padding: 20px 16px 16px;
      gap: 14px;
    }
    .player-photo {
      width: 72px;
      height: 54px;
      object-fit: cover;
      object-position: top center;
      border-radius: 2px;
      flex-shrink: 0;
      background: var(--s3);
    }
    .player-card-info { flex: 1; min-width: 0; }
    .player-card-name {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
    }
    .player-card-meta {
      font-size: 0.72rem;
      color: var(--dim);
      margin-top: 2px;
    }
    .player-card-live {
      margin-top: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--white);
    }

    .prop-list {
      padding: 8px 0;
    }
    .prop-row {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .prop-row:active { background: var(--s2); }
    .prop-row.selected { background: #111; border-left: 2px solid #860038; }
    .prop-main-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px 6px;
    }
    .prop-type-label {
      font-size: 9px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .prop-line-val {
      font-size: 13px;
      font-weight: 700;
      color: #ddd;
      margin-top: 2px;
    }
    .books-row {
      display: flex;
      gap: 4px;
      padding: 0 16px 10px;
    }
    .book-chips {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .book-chip {
      flex: 1;
      background: #111;
      padding: 5px 4px;
      text-align: center;
      border: none;
      border-radius: 0;
    }
    .book-chip.best { background: #0a1a00; }
    .book-name {
      font-size: 7px;
      color: #333;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .book-odds {
      font-size: 11px;
      font-weight: 900;
      color: #666;
    }
    .book-chip.best .book-odds { color: #39ff14; }
    .best-tag {
      font-size: 6px;
      color: #39ff14;
      font-weight: 700;
      margin-top: 1px;
      letter-spacing: 0.06em;
    }
    .hot-pill {
      background: #0d1f00;
      border: 1px solid #39ff14;
      color: #39ff14;
      font-size: 7px;
      font-weight: 900;
      padding: 1px 4px;
      letter-spacing: 0.06em;
    }
    .cold-pill {
      background: #1a0500;
      border: 1px solid #5a2000;
      color: #864000;
      font-size: 7px;
      font-weight: 900;
      padding: 1px 4px;
      letter-spacing: 0.06em;
    }

    .run-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 16px auto;
      padding: 15px;
      background: var(--primary);
      border: none;
      border-radius: 3px;
      color: var(--white);
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .run-btn:active { opacity: 0.8; }
    .run-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Analysis Screen ─────────────────────────────────── */
    .verdict-block {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--s1);
    }
    .verdict-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }
    .verdict-main {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
    }
    .verdict-main.over { color: var(--over); }
    .verdict-main.under { color: #ff6688; }
    .verdict-main.toss { color: var(--toss); }
    .confidence-bar-wrap {
      margin-top: 12px;
    }
    .conf-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--dim);
      margin-bottom: 5px;
    }
    .conf-bar-bg {
      height: 6px;
      background: var(--s3);
      border-radius: 3px;
      overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .conf-bar-fill.over { background: var(--over); }
    .conf-bar-fill.under { background: #ff4444; }

    .narrative-block {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .narrative-text {
      font-size: 0.88rem;
      line-height: 1.65;
      color: #cccccc;
    }

    .math-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .math-toggle-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .math-toggle-arrow {
      color: var(--dim);
      transition: transform 0.2s;
    }
    .math-toggle.open .math-toggle-arrow { transform: rotate(180deg); }

    .math-detail {
      display: none;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--s1);
    }
    .math-detail.open { display: block; }
    .model-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .model-row:last-child { border-bottom: none; }
    .model-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--dim);
    }
    .model-value {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--white);
    }

    .alert-card {
      margin: 12px 16px;
      padding: 12px 14px;
      background: rgba(134,0,56,0.12);
      border: 1px solid rgba(134,0,56,0.35);
      border-radius: 3px;
    }
    .alert-title {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #ff6688;
      margin-bottom: 4px;
    }
    .alert-body {
      font-size: 0.8rem;
      line-height: 1.5;
      color: #cc9999;
    }

    .share-row {
      padding: 16px;
      display: flex;
      gap: 10px;
    }
    .share-btn {
      flex: 1;
      padding: 12px;
      background: var(--s2);
      border: 1px solid var(--border2);
      border-radius: 3px;
      color: var(--white);
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }
    .share-btn:active { background: var(--s3); }

    /* ── Loading spinner ─────────────────────────────────── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      gap: 12px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-label {
      font-size: 0.78rem;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 24px;
      gap: 8px;
      text-align: center;
    }
    .empty-icon { font-size: 2rem; opacity: 0.3; }
    .empty-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--dim);
    }
    .empty-sub {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Search / History / Account screens ─────────────── */
    .search-input {
      display: block;
      width: calc(100% - 32px);
      margin: 16px auto;
      padding: 12px 14px;
      background: var(--s2);
      border: 1px solid var(--border2);
      border-radius: 3px;
      color: var(--white);
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--primary); }

    .history-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .history-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--white);
    }
    .history-meta {
      font-size: 0.7rem;
      color: var(--dim);
      margin-top: 2px;
    }
    .history-verdict {
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .account-section {
      margin: 0;
      border-bottom: 1px solid var(--border);
    }
    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .account-row:last-child { border-bottom: none; }
    .account-row-label {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--white);
    }
    .account-row-val {
      font-size: 0.88rem;
      color: var(--dim);
    }
    .account-section-title {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 16px 16px 6px;
    }

    .pill-badge {
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .pill-badge.pro { background: rgba(134,0,56,0.2); color: #ff8aaa; border: 1px solid rgba(134,0,56,0.5); }
    .pill-badge.free { background: var(--s3); color: var(--dim); border: 1px solid var(--border2); }

    .upgrade-banner {
      margin: 16px;
      padding: 14px;
      background: var(--s1);
      border: 1px solid rgba(134,0,56,0.4);
      border-radius: 3px;
      display: flex;

function generateMockProps(player, liveStats) {
  const pts = liveStats?.pts ?? 0;
  const reb = liveStats?.reb ?? 0;
  const ast = liveStats?.ast ?? 0;
  const s = player.season;

  function calcProb(current, seasonAvg, line, minsPlayed) {
    if (!minsPlayed) return 0.50;
    const projected = current + (current / minsPlayed) * 12;
    const diff = (projected - line) / (seasonAvg * 0.3 + 0.1);
    return Math.max(0.15, Math.min(0.85, 0.5 + diff * 0.15));
  }

  const minsPlayed = liveStats?.min ?? 1;
  const ptsLine = parseFloat((s.pts * 0.92).toFixed(1));
  const rebLine = parseFloat((s.reb * 0.90).toFixed(1));
  const astLine = parseFloat((s.ast * 0.90).toFixed(1));
  const praLine = parseFloat(((s.pts + s.reb + s.ast) * 0.91).toFixed(1));

  const ptsProb = calcProb(pts, s.pts, ptsLine, minsPlayed);
  const rebProb = calcProb(reb, s.reb, rebLine, minsPlayed);
  const astProb = calcProb(ast, s.ast, astLine, minsPlayed);
  const praProb = calcProb(pts+reb+ast, s.pts+s.reb+s.ast, praLine, minsPlayed);

  function toVerdict(p) {
    if (p >= 0.68) return { v:'STRONG OVER', c:'go' };
    if (p >= 0.55) return { v:'LEAN OVER', c:'go' };
    if (p >= 0.45) return { v:'TOSS UP', c:'toss' };
    if (p >= 0.32) return { v:'LEAN UNDER', c:'un' };
    return { v:'STRONG UNDER', c:'un' };
  }

  return [
    { id:`${player.id}-pts`, label:'Points', line:ptsLine, prob:ptsProb, ...toVerdict(ptsProb), statKey:'pts', dk: ptsProb > 0.55 ? -112 : -108, fd: ptsProb > 0.55 ? -115 : -105, pp: ptsLine },
    { id:`${player.id}-reb`, label:'Rebounds', line:rebLine, prob:rebProb, ...toVerdict(rebProb), statKey:'reb', dk: rebProb > 0.55 ? -110 : -108, fd: rebProb > 0.55 ? -112 : -105, pp: rebLine },
    { id:`${player.id}-ast`, label:'Assists', line:astLine, prob:astProb, ...toVerdict(astProb), statKey:'ast', dk: astProb > 0.55 ? -114 : -108, fd: astProb > 0.55 ? -115 : -105, pp: astLine },
    { id:`${player.id}-pra`, label:'PRA', line:praLine, prob:praProb, ...toVerdict(praProb), statKey:'pra', dk: praProb > 0.55 ? -112 : -110, fd: praProb > 0.55 ? -115 : -108, pp: praLine },
  ];
}

const SCREEN_IDS = {
  home: 'screen-home',
  boxscore: 'screen-boxscore',
  playercard: 'screen-playercard',
  analysis: 'screen-analysis',
  search: 'screen-search',
  history: 'screen-history',
  account: 'screen-account',
};

const BOTTOM_NAV_SCREENS = ['home', 'search', 'history', 'account'];

function navTo(name, pushHistory = true) {
  if (name === currentScreen) return;
  const prev = currentScreen;
  if (pushHistory && BOTTOM_NAV_SCREENS.includes(prev)) {
    screenHistory = [];
  }
  if (pushHistory) screenHistory.push(prev);

  const prevEl = document.getElementById(SCREEN_IDS[prev]);
  const nextEl = document.getElementById(SCREEN_IDS[name]);
  if (!nextEl) return;

  prevEl?.classList.add('slide-left');
  nextEl.classList.remove('hidden', 'slide-left');

  requestAnimationFrame(() => {
    setTimeout(() => {
      prevEl?.classList.add('hidden');
      prevEl?.classList.remove('slide-left');
    }, 280);
  });

  currentScreen = name;

  // Update global bottom nav active state
  document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('bnav-' + name);
  if (activeBtn) activeBtn.classList.add('active');

  if (name === 'history') renderHistoryScreen();
  if (name === 'account') renderAccountScreen();
  if (name === 'search') renderSearchScreen();
}

function goBack(fallback) {
  const prev = screenHistory.pop();
  const target = prev || fallback || 'home';
  const prevEl = document.getElementById(SCREEN_IDS[currentScreen]);
  const nextEl = document.getElementById(SCREEN_IDS[target]);
  if (!nextEl) return;

  prevEl?.classList.add('hidden');
  nextEl.classList.remove('hidden', 'slide-left');
  currentScreen = target;
}

function generateSparkData(season, current) {
  // Generate fake-but-realistic 5-game sparkline values
  const base = season || 20;
  return [
    Math.round(base * (0.8 + Math.random() * 0.4)),
    Math.round(base * (0.8 + Math.random() * 0.4)),
    Math.round(base * (0.8 + Math.random() * 0.4)),
    Math.round(base * (0.8 + Math.random() * 0.4)),
    typeof current === 'number' ? current : Math.round(base),
  ];
}

function sparklineSVG(vals) {
  const w = 44, h = 20, pad = 2;
  const min = Math.min(...vals);
  const max = Math.max(...vals) || 1;
  const xStep = (w - pad * 2) / (vals.length - 1);
  const points = vals.map((v, i) => {
    const x = pad + i * xStep;
    const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${points}" fill="none" stroke="#860038" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${(pad + (vals.length-1)*xStep).toFixed(1)}" cy="${(h - pad - ((vals[vals.length-1]-min)/(max-min||1))*(h-pad*2)).toFixed(1)}" r="2" fill="#860038"/>
  </svg>`;
}

// ── Run Analysis ──────────────────────────────────────────
async function runAnalysis() {
  if (!activeProp || !activePlayer || !activeGame) return;

  const btn = document.getElementById('run-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Analyzing…'; }

  const ls = activeGame.liveStats?.[activePlayer.id] || {};
  const currentStat = (() => {
    switch (activeProp.statKey) {
      case 'pts': return ls.pts || 0;
      case 'reb': return ls.reb || 0;
      case 'ast': return ls.ast || 0;
      case 'pra': return (ls.pts || 0) + (ls.reb || 0) + (ls.ast || 0);
      default: return 0;
    }
  })();

  const payload = {
    playerName: activePlayer.name,
    sport: activeGame.sport,
    statType: activeProp.statKey,
    currentStat,
    propLine: activeProp.line,
    period: activeGame.period,
    timeRemaining: activeGame.timeRemaining,
    homeScore: activeGame.homeScore,
    awayScore: activeGame.awayScore,
  };

  try {
    const r = await fetch('/api/liveunder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (r.status === 401) {
      lastAnalysis = mockAnalysis(currentStat, activeProp.line, activeProp.prob);
    } else if (!r.ok) {
      throw new Error(data.error || 'API error');
    } else {
      lastAnalysis = data;
    }
  } catch (err) {
    lastAnalysis = mockAnalysis(currentStat, activeProp.line, activeProp.prob);
  }

  renderResult(lastAnalysis);
  saveToHistory();
  navTo('analysis');
}

function mockAnalysis(currentStat, propLine, probOrBadge) {
  const needed = propLine - currentStat;
  const prob = typeof probOrBadge === 'number' ? probOrBadge
    : probOrBadge === 'hot' ? 0.62 : probOrBadge === 'cold' ? 0.38 : 0.50;
  const verdict = prob > 0.55 ? 'OVER' : prob < 0.45 ? 'UNDER' : 'TOSS';
  const bookOdds = -110;
  const impliedProb = 0.5238;
  const edge = (prob - impliedProb) * 100;
  return {
    verdict,
    probability: prob,
    confidence: Math.abs(prob - 0.5) * 2,
    ev: parseFloat(((prob / impliedProb - 1) * 100).toFixed(1)),
    narrative: `${activePlayer.name} needs ${needed.toFixed(1)} more ${activeProp.label.toLowerCase()} to hit. Based on current pace and game state, the math ${verdict === 'OVER' ? 'favors the over' : verdict === 'UNDER' ? 'favors the under' : 'is a toss-up'}.`,
    models: {
      bayesian: parseFloat(prob.toFixed(3)),
      poisson: parseFloat((prob * (0.9 + Math.random() * 0.2)).toFixed(3)),
      gameState: badge === 'hot' ? 1.08 : badge === 'cold' ? 0.92 : 1.0,
      hotHand: badge === 'hot' ? 1.06 : badge === 'cold' ? 0.94 : 1.0,
      pace: null,
    },
    kelly: {
      edge: parseFloat(edge.toFixed(1)),
      unitSize: parseFloat((Math.max(0, edge) * 0.25).toFixed(1)),
    },
    bestBook: activeProp.dk >= activeProp.fd ? { book: 'DK', odds: activeProp.dk } : { book: 'FD', odds: activeProp.fd },
  };
}

// ── Analysis Screen ───────────────────────────────────────
function renderResult(data) {
  const body = document.getElementById('an-body');
  if (!data || !activeProp || !activePlayer) return;

  const verdict = data.verdict || 'TOSS';
  const prob = data.probability || 0.5;
  const conf = data.confidence || Math.abs(prob - 0.5) * 2;
  const confPct = Math.round(conf * 100);
  const verdictClass = verdict === 'OVER' ? 'over' : verdict === 'UNDER' ? 'under' : 'toss';
  const confFillClass = verdict === 'OVER' ? 'over' : verdict === 'UNDER' ? 'under' : '';
  const ev = data.ev || 0;
  const evStr = ev > 0 ? `+${ev.toFixed(1)}%` : `${ev.toFixed(1)}%`;
  const kelly = data.kelly || {};
  const models = data.models || {};
  const narrative = data.narrative || `Math analysis for ${activePlayer.name} ${activeProp.label} ${activeProp.line}.`;

  // Book chips
  const booksForDisplay = [
    { name: 'DK', odds: activeProp.dk },
    { name: 'FD', odds: activeProp.fd },
    { name: 'PP', odds: activeProp.pp },
  ];
  const bookHtml = booksForDisplay.map(({ name, odds }) => {
    const isNum = typeof odds === 'number';
    const cls = isNum && odds > 0 ? 'positive' : isNum && odds < -115 ? 'negative' : '';
    const display = isNum ? (odds > 0 ? `+${odds}` : odds) : odds;
    return `<span class="book-chip ${cls}" style="padding:3px 8px;font-size:0.65rem;font-weight:700;letter-spacing:0.04em;">${name} ${display}</span>`;
  }).join('');

  // Model rows
  const modelRows = [
    ['Bayesian Blend', models.bayesian ? (models.bayesian * 100).toFixed(1) + '%' : '—'],
    ['Poisson CDF', models.poisson ? (models.poisson * 100).toFixed(1) + '%' : '—'],
    ['Game State', models.gameState ? `×${models.gameState.toFixed(2)}` : '—'],
    ['Hot Hand', models.hotHand ? `×${models.hotHand.toFixed(2)}` : '—'],
    ['Pace Projection', models.pace ? `${models.pace} pts/min` : 'N/A'],
    ['Kelly Edge', kelly.edge !== undefined ? `${kelly.edge > 0 ? '+' : ''}${kelly.edge}%` : '—'],
    ['Unit Size', kelly.unitSize !== undefined ? `${kelly.unitSize}% of bankroll` : '—'],
  ].map(([name, val]) => `<div class="model-row">
    <span class="model-name">${name}</span>
    <span class="model-value">${val}</span>
  </div>`).join('');

  // Alert if toss or negative EV
  let alertHtml = '';
  if (verdict === 'TOSS' || ev < -3) {
    alertHtml = `<div class="alert-card">
      <div class="alert-title">${verdict === 'TOSS' ? 'Too Close to Call' : 'Negative Expected Value'}</div>
      <div class="alert-body">${verdict === 'TOSS'
        ? 'The models don\'t have enough edge here. Avoid or size down.'
        : `Expected value is ${evStr}. Book has the edge. Skip this one.`}</div>
    </div>`;
  }

  body.innerHTML = `
    <div class="verdict-block">
      <div class="verdict-label">${esc(activePlayer.name)} · ${esc(activeProp.label)} ${activeProp.line}</div>
      <div class="verdict-main ${verdictClass}">${verdict}</div>
      <div style="font-size:0.8rem;color:var(--dim);margin-top:4px">
        ${Math.round(prob * 100)}% probability · EV ${evStr}
      </div>
      <div class="confidence-bar-wrap">
        <div class="conf-label"><span>Confidence</span><span>${confPct}%</span></div>
        <div class="conf-bar-bg"><div class="conf-bar-fill ${confFillClass}" style="width:${confPct}%"></div></div>
      </div>
    </div>
    <div class="narrative-block">
      <div class="narrative-text">${esc(narrative)}</div>
    </div>
    ${alertHtml}
    <div class="math-toggle" onclick="toggleMath(this)">
      <span class="math-toggle-label">See the Math</span>
      <span class="math-toggle-arrow">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
    </div>
    <div class="math-detail" id="math-detail">${modelRows}</div>
    <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
      <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px">Lines</div>
      <div class="book-chips">${bookHtml}</div>
    </div>
    <div class="share-row">
      <button class="share-btn" onclick="shareAnalysis()">Share</button>
      <button class="share-btn" onclick="navTo('home')">New Game</button>
    </div>
  `;
}

function toggleMath(el) {
  el.classList.toggle('open');
  const detail = document.getElementById('math-detail');
  if (detail) detail.classList.toggle('open');
}

function shareAnalysis() {
  if (!lastAnalysis || !activeProp || !activePlayer) return;
  const text = `${activePlayer.name} ${activeProp.label} ${activeProp.line} — ${lastAnalysis.verdict} (${Math.round((lastAnalysis.probability||0.5)*100)}% · EV ${lastAnalysis.ev>0?'+':''}${(lastAnalysis.ev||0).toFixed(1)}%) via Parlay Killer`;
  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
  }
}

// ── History ───────────────────────────────────────────────
function saveToHistory() {
  if (!activePlayer || !activeProp || !lastAnalysis) return;
  const history = JSON.parse(localStorage.getItem('pk_history') || '[]');
  history.unshift({
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
    player: activePlayer.name,
    prop: `${activeProp.label} ${activeProp.line}`,
    verdict: lastAnalysis.verdict || 'TOSS',
    prob: Math.round((lastAnalysis.probability || 0.5) * 100),
    ev: lastAnalysis.ev || 0,
  });
  localStorage.setItem('pk_history', JSON.stringify(history.slice(0, 20)));
}

function renderHistoryScreen() {
  const body = document.getElementById('history-body');
  const history = JSON.parse(localStorage.getItem('pk_history') || '[]');

  if (!history.length) {
    body.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No analyses yet</div>
      <div class="empty-sub">Run your first analysis from a live game.</div>
    </div>`;
    return;
  }

  const items = history.map(h => {
    const vc = h.verdict === 'OVER' ? '#39ff14' : h.verdict === 'UNDER' ? '#ff6688' : '#f5a623';
    const evStr = h.ev > 0 ? `+${h.ev.toFixed(1)}%` : `${h.ev.toFixed(1)}%`;
    return `<div class="history-item">
      <div>
        <div class="history-name">${esc(h.player)}</div>
        <div class="history-meta">${esc(h.prop)} · ${esc(h.date)}</div>
      </div>
      <div>
        <div class="history-verdict" style="color:${vc}">${h.verdict}</div>
        <div style="font-size:0.68rem;color:var(--dim);text-align:right">${h.prob}% · ${evStr}</div>
      </div>
    </div>`;
  }).join('');

  body.innerHTML = `<div class="section-label">Recent Analyses</div>${items}`;
}

// ── Search Screen ─────────────────────────────────────────
function renderSearchScreen() {
  const results = document.getElementById('search-results');
  results.innerHTML = '';
}

function onSearchInput(val) {
  const results = document.getElementById('search-results');
  const q = val.toLowerCase().trim();
  if (!q) { results.innerHTML = ''; return; }

  const matches = Object.values(PLAYERS).filter(p =>
    p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q)
  );

  if (!matches.length) {
    results.innerHTML = `<div class="empty-state"><div class="empty-title">No players found</div></div>`;
    return;
  }

  results.innerHTML = matches.map(p => `
    <div class="player-row" onclick="openPlayerFromSearch('${p.id}')">
      <div class="player-info">
        <div class="player-row-name">${esc(p.name)}</div>
        <div class="player-row-pos">${p.pos} · ${p.team}</div>
      </div>
      <div class="player-stats-mini">
        <div class="mini-stat">
          <div class="mini-stat-val">${p.season.pts}</div>
          <div class="mini-stat-lbl">PTS</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-val">${p.season.reb}</div>
          <div class="mini-stat-lbl">REB</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-val">${p.season.ast}</div>
          <div class="mini-stat-lbl">AST</div>
        </div>
      </div>
    </div>`).join('');
}

function openPlayerFromSearch(playerId) {
  // Find the game this player is in
  const game = LIVE_GAMES.find(g =>
    Object.values(g.players || {}).flat().includes(playerId)
  );
  if (game) {
    activeGame = game;
    const teamAbbr = Object.entries(game.players).find(([, ids]) => ids.includes(playerId))?.[0];
    activeTeam = teamAbbr === game.homeAbbr ? 'home' : 'away';
  } else {
    activeGame = null;
  }
  activeProp = null;
  openPlayerCard(playerId);
}

// ── Account Screen ────────────────────────────────────────

  const body = document.getElementById('account-body');

  if (!currentUser) {
    body.innerHTML = `
      <div style="padding:24px 16px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.12em;color:#333;text-transform:uppercase;margin-bottom:16px;">Account</div>
        <div style="color:#555;font-size:14px;margin-bottom:24px;line-height:1.6;">Sign in to track your analyses and unlock unlimited access.</div>
        <button onclick="window.location.href='/'" style="width:100%;background:#860038;color:#fff;font-size:11px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;border:none;padding:14px;cursor:pointer;margin-bottom:10px;">Sign In / Create Account</button>
      </div>`;
    return;
  }

  const name = currentUser.name || currentUser.email || 'User';
  const plan = currentUser.tier || currentUser.plan || 'free';
  const usage = currentUser.todayUsage || 0;
  const initial = name[0].toUpperCase();

  body.innerHTML = `
    <div style="padding:24px 16px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.12em;color:#333;text-transform:uppercase;margin-bottom:16px;">Account</div>
      <div style="background:#111;border:1px solid #1e1e1e;padding:14px 16px;margin-bottom:12px;">
        <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;">${esc(name)}</div>
        <div style="font-size:11px;color:#555;">${esc(currentUser.email || '')}</div>
        <div style="font-size:11px;color:#860038;margin-top:6px;font-weight:700;">${plan === 'pro' ? '⚡ PRO — Unlimited' : 'Free — ' + (3 - usage) + ' analyses remaining'}</div>
      </div>
      ${plan !== 'pro' ? `<button onclick="window.location.href='/account.html'" style="width:100%;background:#860038;color:#fff;font-size:11px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;border:none;padding:14px;cursor:pointer;margin-bottom:10px;">Upgrade to Pro — $9.99/mo</button>` : ''}
      <button onclick="signOut()" style="width:100%;background:none;border:1px solid #333;color:#555;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:14px;cursor:pointer;margin-bottom:10px;">Sign Out</button>
      <a href="/account.html" style="display:block;text-align:center;font-size:11px;color:#444;text-decoration:none;margin-top:8px;">Account Settings →</a>
    </div>`;
}

// ── Utilities ─────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Init ──────────────────────────────────────────────────
checkAuth();
renderHome();
</script>
