<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parlay Killer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --red: #e63946;
      --red-dim: #b02d38;
      --green: #2dc653;
      --yellow: #f4a261;
      --text: #f0f0f0;
      --muted: #888;
      --font: 'Courier New', Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 0 16px 60px;
    }

    /* ── Header ── */
    header {
      border-bottom: 2px solid var(--red);
      padding: 28px 0 20px;
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--red);
    }

    header h1 span { color: var(--text); }

    header p {
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    .container { max-width: 820px; margin: 0 auto; }

    section { margin-bottom: 32px; }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
      border-left: 3px solid var(--red);
      padding-left: 8px;
    }

    /* ── Leg inputs ── */
    #legs-container { display: flex; flex-direction: column; gap: 10px; }

    .leg-row {
      display: grid;
      grid-template-columns: 1fr 110px 36px;
      gap: 8px;
      align-items: center;
    }

    input[type="text"], input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--red);
    }

    input::placeholder { color: var(--muted); }

    .btn-remove {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      height: 38px;
      width: 36px;
      transition: color 0.15s, border-color 0.15s;
      font-family: var(--font);
    }

    .btn-remove:hover { color: var(--red); border-color: var(--red); }

    /* ── Controls row ── */
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 9px 16px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn:hover { border-color: var(--red); color: var(--red); }

    .btn-primary {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      font-size: 0.9rem;
      padding: 12px 28px;
      letter-spacing: 0.1em;
    }

    .btn-primary:hover { background: var(--red-dim); border-color: var(--red-dim); color: #fff; }

    .wager-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .wager-row label {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .wager-row input { max-width: 120px; }

    /* ── Results ── */
    #results { display: none; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 16px;
      text-align: center;
    }

    .metric-card .metric-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .metric-card .metric-value {
      font-size: 1.9rem;
      font-weight: bold;
      color: var(--text);
    }

    .metric-card .metric-sub {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Verdict ── */
    .verdict {
      border: 2px solid var(--border);
      padding: 18px 20px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .verdict.good  { border-color: var(--green);  background: #0d1f12; }
    .verdict.bad   { border-color: var(--red);    background: #1f0d0e; }
    .verdict.ugly  { border-color: var(--yellow); background: #1f170d; }

    .verdict-title {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .verdict.good  .verdict-title { color: var(--green); }
    .verdict.bad   .verdict-title { color: var(--red); }
    .verdict.ugly  .verdict-title { color: var(--yellow); }

    .verdict-text { color: var(--text); }

    /* ── Warnings ── */
    .warnings-list { display: flex; flex-direction: column; gap: 8px; }

    .warning-item {
      background: var(--surface);
      border-left: 3px solid var(--yellow);
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--yellow);
      line-height: 1.5;
    }

    /* ── Suggestion ── */
    .suggestion-box {
      background: #0d1f12;
      border: 1px solid var(--green);
      padding: 16px 18px;
    }

    .suggestion-box .suggestion-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 8px;
    }

    .suggestion-box p { font-size: 0.85rem; color: var(--text); line-height: 1.6; }

    /* ── Leg detail table ── */
    .leg-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

    .leg-table th {
      text-align: left;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    .leg-table td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .leg-table tr:last-child td { border-bottom: none; }

    .prob-bar-wrap {
      background: var(--surface2);
      height: 6px;
      width: 100px;
      display: inline-block;
      vertical-align: middle;
      margin-left: 8px;
    }

    .prob-bar { height: 100%; background: var(--red); }

    /* ── Error ── */
    #error-msg {
      display: none;
      background: #1f0d0e;
      border: 1px solid var(--red);
      color: var(--red);
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-top: 12px;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .leg-row { grid-template-columns: 1fr 90px 36px; }
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <h1><span>Parlay</span> Killer</h1>
    <p>The math the sportsbook doesn't want you to see</p>
  </header>

  <!-- Legs -->
  <section>
    <div class="section-label">Parlay Legs</div>
    <div id="legs-container"></div>
    <div class="controls">
      <button class="btn" onclick="addLeg()">+ Add Leg</button>
      <div class="wager-row">
        <label for="wager">Wager $</label>
        <input type="number" id="wager" value="50" min="1" step="1" />
      </div>
    </div>
  </section>

  <!-- Analyze button -->
  <section>
    <button class="btn btn-primary" onclick="analyze()">Analyze Parlay</button>
    <div id="error-msg"></div>
  </section>

  <!-- Results -->
  <div id="results">

    <section>
      <div class="section-label">Key Metrics</div>
      <div class="metrics">
        <div class="metric-card">
          <div class="metric-label">True Win Chance</div>
          <div class="metric-value" id="m-trueParlay">—</div>
          <div class="metric-sub">After 4.5% book hold</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Expected Value</div>
          <div class="metric-value" id="m-ev">—</div>
          <div class="metric-sub" id="m-evPct">—</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Potential Payout</div>
          <div class="metric-value" id="m-bookPayout">—</div>
          <div class="metric-sub" id="m-fairPayout">—</div>
        </div>
      </div>
    </section>

    <section>
      <div class="section-label">Verdict</div>
      <div class="verdict" id="verdict-box">
        <div class="verdict-title" id="verdict-title"></div>
        <div class="verdict-text" id="verdict-text"></div>
      </div>
    </section>

    <section id="warnings-section" style="display:none">
      <div class="section-label">Warnings</div>
      <div class="warnings-list" id="warnings-list"></div>
    </section>

    <section>
      <div class="section-label">Best 2-Leg Suggestion</div>
      <div class="suggestion-box">
        <div class="suggestion-label">Lower-Edge Alternative</div>
        <p id="suggestion-text"></p>
      </div>
    </section>

    <section>
      <div class="section-label">Leg Breakdown</div>
      <table class="leg-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Description</th>
            <th>Odds</th>
            <th>True Prob</th>
          </tr>
        </thead>
        <tbody id="leg-tbody"></tbody>
      </table>
    </section>

  </div><!-- /results -->

</div><!-- /container -->

<script>
  // ── Leg management ──────────────────────────────────────────────────────────

  const DEFAULT_LEGS = [
    { desc: 'Chiefs ML', odds: '-150' },
    { desc: 'Lakers -4.5', odds: '+110' },
    { desc: 'Over 220.5 Points', odds: '-115' },
  ];

  let legCount = 0;

  function createLegRow(desc = '', odds = '') {
    legCount++;
    const id = legCount;
    const row = document.createElement('div');
    row.className = 'leg-row';
    row.dataset.legId = id;
    row.innerHTML = `
      <input type="text" placeholder="Leg description (e.g. Chiefs ML)" value="${esc(desc)}" class="leg-desc" />
      <input type="text" placeholder="Odds (+110)" value="${esc(odds)}" class="leg-odds" />
      <button class="btn-remove" onclick="removeLeg(this)" title="Remove leg">&times;</button>
    `;
    return row;
  }

  function addLeg(desc = '', odds = '') {
    document.getElementById('legs-container').appendChild(createLegRow(desc, odds));
  }

  function removeLeg(btn) {
    const container = document.getElementById('legs-container');
    const rows = container.querySelectorAll('.leg-row');
    if (rows.length <= 1) return; // keep at least one
    btn.closest('.leg-row').remove();
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }

  // Pre-load defaults
  DEFAULT_LEGS.forEach(l => addLeg(l.desc, l.odds));

  // ── Analyze ─────────────────────────────────────────────────────────────────

  async function analyze() {
    clearError();

    const rows = document.querySelectorAll('.leg-row');
    const legs = [];

    for (const row of rows) {
      const desc = row.querySelector('.leg-desc').value.trim();
      const odds = row.querySelector('.leg-odds').value.trim();
      if (!desc || !odds) { showError('All legs need a description and odds.'); return; }
      if (!/^[+-]?\d+$/.test(odds)) { showError(`Invalid odds format: "${odds}". Use American odds like +200 or -110.`); return; }
      legs.push({ desc, odds });
    }

    const wager = parseFloat(document.getElementById('wager').value);
    if (!wager || wager <= 0) { showError('Enter a valid wager amount.'); return; }

    let data;
    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ legs, wager }),
      });
      data = await res.json();
      if (!res.ok) { showError(data.error || 'Server error.'); return; }
    } catch (e) {
      showError('Could not reach server. Is it running?');
      return;
    }

    renderResults(data);
  }

  // ── Render ──────────────────────────────────────────────────────────────────

  function renderResults(d) {
    // Metrics
    set('m-trueParlay', pct(d.trueParlay, 2));
    set('m-ev', dollar(d.ev));
    set('m-evPct', `${(d.evPct * 100).toFixed(1)}% of wager`);
    set('m-bookPayout', dollar(d.bookPayout));
    set('m-fairPayout', `Fair value: ${dollar(d.fairPayout)}`);

    // Verdict
    const vBox = document.getElementById('verdict-box');
    const vTitle = document.getElementById('verdict-title');
    const vText = document.getElementById('verdict-text');

    vBox.className = 'verdict';
    if (d.evPct >= 0) {
      vBox.classList.add('good');
      vTitle.textContent = 'Positive EV — Rare but Real';
      vText.textContent = `This parlay shows a positive expected value of ${dollar(d.ev)} (${(d.evPct*100).toFixed(1)}%). ` +
        `True win probability is ${pct(d.trueParlay, 2)} vs the book's implied ${pct(d.impliedParlay, 2)}. Proceed with caution — variance is still massive.`;
    } else if (d.evPct >= -0.2) {
      vBox.classList.add('ugly');
      vTitle.textContent = 'Negative EV — Moderate Damage';
      vText.textContent = `You're expected to lose ${dollar(Math.abs(d.ev))} per bet (${(d.evPct*100).toFixed(1)}%). ` +
        `The book's hold compounds across ${d.legs.length} legs. Fair payout would be ${dollar(d.fairPayout)} vs offered ${dollar(d.bookPayout)}.`;
    } else {
      vBox.classList.add('bad');
      vTitle.textContent = 'Parlay Killer — Walk Away';
      vText.textContent = `Severe negative EV of ${(d.evPct*100).toFixed(1)}%. For every $${d.wager} wagered you can expect to lose ` +
        `${dollar(Math.abs(d.ev))} on average. The sportsbook is extracting serious value from this bet.`;
    }

    // Warnings
    const wSection = document.getElementById('warnings-section');
    const wList = document.getElementById('warnings-list');
    wList.innerHTML = '';
    if (d.warnings.length > 0) {
      d.warnings.forEach(w => {
        const el = document.createElement('div');
        el.className = 'warning-item';
        el.textContent = w;
        wList.appendChild(el);
      });
      wSection.style.display = '';
    } else {
      wSection.style.display = 'none';
    }

    // Suggestion
    set('suggestion-text', d.suggestion.note);

    // Leg table
    const tbody = document.getElementById('leg-tbody');
    tbody.innerHTML = '';
    d.legs.forEach((leg, i) => {
      const tr = document.createElement('tr');
      const barWidth = Math.round(leg.trueProb * 100);
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${esc(leg.desc)}</td>
        <td style="color:${oddsColor(leg.odds)}">${leg.odds}</td>
        <td>
          ${pct(leg.trueProb, 1)}
          <span class="prob-bar-wrap"><span class="prob-bar" style="width:${barWidth}%"></span></span>
        </td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function set(id, val) { document.getElementById(id).textContent = val; }

  function pct(val, decimals = 1) { return (val * 100).toFixed(decimals) + '%'; }

  function dollar(val) {
    const sign = val < 0 ? '-' : '+';
    return sign + '$' + Math.abs(val).toFixed(2);
  }

  function oddsColor(odds) {
    const n = parseFloat(odds);
    if (n > 0) return '#2dc653';
    if (n < -150) return '#e63946';
    return '#f0f0f0';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = '';
  }

  function clearError() {
    const el = document.getElementById('error-msg');
    el.style.display = 'none';
    el.textContent = '';
  }
</script>

</body>
</html>
