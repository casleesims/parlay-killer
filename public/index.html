<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Parlay Killer Live Edge</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #141e2b; --s1: #1a2535; --s2: #1e2c3e; --s3: #243347;
      --border: #253042; --b2: #2d3d52;
      --blue: #4da6ff; --blue-dim: rgba(77,166,255,0.12); --blue-border: rgba(77,166,255,0.25);
      --red: #ff453a; --amber: #f5a623; --avoid: #ff5a52;
      --white: #e8f2fb; --dim: #4a6480; --muted: #2d3d52; --navy: #0d1520;
    }
    html { height: 100%; overflow: hidden; }
    body { height: 100%; overflow: hidden; background: var(--bg); color: var(--white); font-family: 'DM Sans', sans-serif; }

    /* LOGO */
    .logo { display: flex; align-items: center; line-height: 1; }
    .logo-pk { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
    .logo-pk em { color: var(--blue); font-style: normal; }
    .logo-le { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--red); letter-spacing: 0.1em; margin-left: 7px; position: relative; top: 1px; }

    /* APP SHELL */
    #app { position: fixed; inset: 0; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; overflow: hidden; }
    #screens { position: relative; flex: 1; overflow: hidden; min-height: 0; }

    /* SCREENS */
    .scr { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.28s cubic-bezier(.4,0,.2,1); overflow-y: auto; overflow-x: hidden; padding-bottom: 80px; -webkit-overflow-scrolling: touch; }
    .scr.active { transform: translateX(0); }
    .scr.behind { transform: translateX(-25%); pointer-events: none; }
    .scr.inactive { transform: translateX(100%); }

    /* TOP BAR */
    .top-bar { display: flex; justify-content: space-between; align-items: center; height: 50px; padding: 0 16px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; background: var(--navy); position: sticky; top: 0; z-index: 10; }
    .top-bar-left { display: flex; align-items: center; gap: 8px; }
    .top-bar-right { display: flex; align-items: center; gap: 8px; }
    .back-btn { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); background: none; border: none; cursor: pointer; padding: 0; }
    .back-btn svg { flex-shrink: 0; }
    .share-btn { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.1em; color: var(--red); background: none; border: none; cursor: pointer; }
    .live-count { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: var(--white); }
    .live-dot { width: 7px; height: 7px; background: var(--blue); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    /* TABS */
    .tabs { display: flex; border-bottom: 0.5px solid var(--border); flex-shrink: 0; position: sticky; top: 50px; z-index: 9; background: var(--navy); }
    .tab { flex: 1; padding: 11px 8px; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; color: rgba(232,242,251,0.65); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; background: none; border-left: none; border-right: none; border-top: none; }
    .tab.active { color: var(--white); border-bottom-color: var(--blue); }

    /* GAME CARD — new design */
    .game-card { border-left: 3px solid transparent; border-bottom: 0.5px solid var(--border); padding: 14px 16px; cursor: pointer; transition: background 0.12s; background: var(--bg); }
    .game-card:active { background: var(--s1); }
    .game-card.edge-over { border-left-color: var(--blue); }
    .game-card.edge-under { border-left-color: var(--avoid); }
    .game-card.edge-wait { border-left-color: var(--amber); }
    .gc-meta { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
    .gc-meta-live { color: var(--blue); }
    .gc-live-dot { display: inline-block; width: 5px; height: 5px; background: var(--blue); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; vertical-align: middle; margin-right: 3px; flex-shrink: 0; }
    .gc-teams { font-size: 14px; font-weight: 500; color: var(--white); margin-bottom: 8px; }
    .gc-score-total { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; margin-bottom: 8px; border-bottom: 0.5px solid var(--border); }
    .gc-score-lbl, .gc-total-lbl { font-size: 9px; color: var(--dim); letter-spacing: 0.06em; text-transform: uppercase; display: block; }
    .gc-score-val { font-size: 13px; font-weight: 500; color: #7a9ab8; }
    .gc-total-num { font-size: 20px; font-weight: 500; color: var(--white); letter-spacing: -0.02em; display: block; }
    .gc-total-book { font-size: 9px; color: var(--dim); display: block; }
    .gc-total-block { text-align: right; }
    .gc-verdict-row { display: flex; align-items: flex-end; justify-content: space-between; }
    .gc-verdict { font-size: 17px; font-weight: 500; letter-spacing: -0.01em; }
    .gc-verdict-over { color: var(--blue); }
    .gc-verdict-wait { color: var(--amber); }
    .gc-verdict-avoid { color: var(--avoid); }
    .gc-verdict-pregame { color: var(--dim); font-size: 13px; }
    .gc-why { font-size: 10px; color: var(--dim); margin-top: 3px; }
    .gc-edge-col { text-align: right; }
    .gc-edge-num { font-size: 13px; font-weight: 500; display: block; }
    .gc-edge-lbl { font-size: 9px; color: var(--dim); }
    .gc-projections { display: flex; gap: 0; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
    .gc-proj-item { flex: 1; display: flex; flex-direction: column; gap: 2px; padding-right: 12px; border-right: 0.5px solid var(--border); margin-right: 12px; }
    .gc-proj-item:last-child { border-right: none; margin-right: 0; padding-right: 0; }
    .gc-proj-label { font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); }
    .gc-proj-val { font-size: 14px; font-weight: 500; color: var(--white); margin-top: 2px; }
    .gc-proj-playable { color: var(--blue); }
    .gc-bet-now { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; background: var(--blue); padding: 10px 14px; cursor: pointer; border-radius: 2px; }
    .gc-bet-now:active { opacity: 0.85; }
    .gc-bet-now-label { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--navy); }
    .gc-bet-now-book { font-size: 11px; color: var(--navy); opacity: 0.7; }

    /* EMPTY STATE */
    .empty-state { padding: 60px 24px; text-align: center; }
    .empty-icon { font-size: 36px; margin-bottom: 14px; opacity: 0.2; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.06em; color: var(--dim); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; font-weight: 300; color: var(--dim); }

    /* SECTION LABEL */
    .section-label { padding: 10px 16px 6px; font-size: 9px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); }

    /* ── GAME VIEW ─────────────────────────────── */
    .score-header { padding: 16px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .sh-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; margin-bottom: 12px; }
    .sh-team { }
    .sh-team.right { text-align: right; }
    .sh-abbr { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.04em; color: var(--white); line-height: 1; }
    .sh-score { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: -0.02em; color: var(--white); line-height: 1; }
    .sh-rec { font-size: 10px; color: var(--dim); margin-top: 3px; }
    .sh-center { text-align: center; }
    .sh-period { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--white); letter-spacing: 0.04em; }
    .sh-clock { font-size: 22px; font-weight: 300; color: var(--white); }
    .sh-live { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; color: var(--blue); display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 4px; }
    .sh-live-dot { width: 5px; height: 5px; background: var(--blue); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; }
    .qtr-chart { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 0.5px solid var(--border); }
    .qtr-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .qtr-bars { display: flex; gap: 2px; align-items: flex-end; height: 28px; }
    .qtr-bar-away { background: #2d3d52; width: 8px; }
    .qtr-bar-home { background: rgba(77,166,255,0.5); width: 8px; }
    .qtr-label { font-size: 6px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; }

    /* EDGE TAB */
    .edge-tab-content { padding: 16px; }
    .clock-strip { display: flex; align-items: center; gap: 10px; padding: 10px 0 16px; border-bottom: 0.5px solid var(--border); margin-bottom: 16px; }
    .clock-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; flex-shrink: 0; }
    .clock-slider { flex: 1; accent-color: var(--blue); }
    .clock-display { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--blue); letter-spacing: 0.06em; flex-shrink: 0; min-width: 40px; text-align: right; }
    .edge-hero { background: var(--s1); border: 0.5px solid var(--b2); padding: 16px; margin-bottom: 14px; }
    .eh-row1 { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 0.5px solid var(--border); gap: 4px; }
    .eh-col-label { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
    .eh-score-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--white); }
    .eh-market-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--white); }
    .eh-model-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
    .eh-model-val.green { color: var(--blue); }
    .eh-model-val.red { color: var(--avoid); }
    .eh-edge { text-align: center; }
    .eh-edge-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.04em; }
    .eh-edge-num.green { color: var(--blue); }
    .eh-edge-num.red { color: var(--avoid); }
    .eh-playable { font-size: 11px; color: var(--dim); margin-top: 4px; }
    .eh-playable span { color: var(--white); font-weight: 500; }
    .conf-bar-wrap { margin-bottom: 14px; }
    .conf-bar-header { display: flex; justify-content: space-between; align-items: center; font-size: 10px; margin-bottom: 6px; }
    .conf-bar-label { font-weight: 500; letter-spacing: 0.08em; color: var(--dim); text-transform: uppercase; }
    .conf-bar-pct { font-weight: 500; }
    .conf-bar-bg { height: 4px; background: var(--muted); }
    .conf-bar-fill { height: 4px; transition: width 0.4s ease; }
    .conf-bar-fill.green { background: var(--blue); }
    .conf-bar-fill.amber { background: var(--amber); }
    .market-chart { margin-bottom: 14px; }
    .market-chart-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
    .windows-section { margin-bottom: 14px; }
    .ws-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
    .win-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .win-tab { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; padding: 5px 10px; border: 1px solid var(--b2); color: var(--dim); cursor: pointer; background: none; transition: all 0.12s; }
    .win-tab.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
    .win-detail { background: var(--s1); border: 0.5px solid var(--b2); padding: 12px 14px; }
    .wd-pts { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.02em; color: var(--white); }
    .wd-range { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .wd-note { font-size: 11px; color: var(--dim); margin-top: 4px; font-style: italic; }
    .alt-line { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; padding: 5px 10px; border: 1px solid; margin-bottom: 14px; }
    .alt-line.full { color: var(--blue); border-color: var(--blue-border); background: var(--blue-dim); }
    .alt-line.thin { color: var(--amber); border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.05); }
    .alt-line.gone { color: var(--avoid); border-color: rgba(255,90,82,0.3); background: rgba(255,90,82,0.05); }
    .signals-section { margin-bottom: 14px; }
    .sig-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
    .sig-row:last-child { border-bottom: none; }
    .sig-name { color: var(--dim); }
    .sig-val { font-weight: 500; }
    .sig-val.green { color: var(--blue); }
    .sig-val.amber { color: var(--amber); }
    .sig-val.red { color: var(--avoid); }
    .action-block { padding: 14px; background: var(--s1); border: 0.5px solid var(--b2); margin-bottom: 14px; }
    .ab-playable { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.04em; color: var(--white); margin-bottom: 4px; }
    .ab-note { font-size: 11px; color: var(--dim); margin-bottom: 14px; }
    .ab-btns { display: flex; gap: 8px; }
    .ab-btn { flex: 1; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 0; border: 1px solid var(--b2); color: var(--white); background: none; cursor: pointer; transition: background 0.12s; }
    .ab-btn.primary { background: var(--blue); color: var(--navy); border-color: var(--blue); }
    .ab-btn.danger { border-color: var(--avoid); color: var(--avoid); }
    .ab-btn:active { opacity: 0.85; }

    /* BOX SCORE */
    .bs-content { padding: 0 0 16px; }
    .bs-team-header { padding: 10px 16px 6px; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); border-bottom: 0.5px solid var(--border); background: var(--s1); }
    .bs-col-headers { display: grid; grid-template-columns: 1fr 40px 40px 40px 44px; padding: 6px 16px; font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); border-bottom: 0.5px solid var(--border); }
    .bs-row { display: grid; grid-template-columns: 1fr 40px 40px 40px 44px; padding: 10px 16px; border-bottom: 0.5px solid var(--border); align-items: center; }
    .bs-row:last-child { border-bottom: none; }
    .bs-name { font-size: 13px; font-weight: 500; color: var(--white); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .bs-pos { font-size: 9px; color: var(--dim); font-weight: 400; }
    .hot-pill { font-family: 'Bebas Neue', sans-serif; font-size: 9px; letter-spacing: 0.08em; color: var(--navy); background: var(--blue); padding: 1px 5px; }
    .bs-stat { font-size: 13px; text-align: center; color: var(--white); }
    .bs-stat.hot { color: var(--blue); font-weight: 500; }

    /* SNAPSHOT */
    .snapshot-wrap { padding: 16px; }
    .share-card { border: 1px solid var(--b2); border-top: 3px solid var(--red); background: var(--s1); padding: 20px; margin-bottom: 16px; }
    .sc-logo { margin-bottom: 14px; }
    .sc-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.06em; color: var(--white); margin-bottom: 2px; }
    .sc-meta { font-size: 10px; color: var(--dim); margin-bottom: 14px; }
    .sc-score { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: -0.01em; color: var(--white); text-align: center; margin-bottom: 14px; }
    .sc-row { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 0.5px solid var(--border); gap: 4px; }
    .sc-row-label { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 3px; }
    .sc-row-val { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--white); }
    .sc-row-val.green { color: var(--blue); }
    .sc-edge { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.04em; text-align: center; margin-bottom: 10px; }
    .sc-edge.green { color: var(--blue); }
    .sc-edge.red { color: var(--avoid); }
    .sc-window { font-size: 11px; text-align: center; color: var(--dim); margin-bottom: 12px; }
    .sc-window span { color: var(--blue); font-weight: 500; }
    .sc-badge-row { text-align: center; margin-bottom: 12px; }
    .sc-badge { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.1em; padding: 4px 12px; border: 1px solid; }
    .sc-badge.heating { color: var(--blue); border-color: var(--blue); }
    .sc-badge.closing { color: var(--amber); border-color: var(--amber); }
    .sc-watermark { font-size: 9px; text-align: center; color: rgba(232,242,251,0.08); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 12px; font-weight: 500; }
    .share-note { font-size: 11px; color: var(--dim); text-align: center; margin-bottom: 16px; }
    .share-btns { display: flex; gap: 10px; }
    .share-btn-el { flex: 1; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.1em; padding: 12px; border: none; cursor: pointer; }
    .share-btn-el.green { background: var(--blue); color: var(--navy); }
    .share-btn-el.ghost { background: none; border: 1px solid var(--b2); color: var(--white); }

    /* ACCOUNT */
    .account-wrap { padding: 24px 16px; }
    .acc-name { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.04em; color: var(--white); margin-bottom: 2px; }
    .acc-email { font-size: 13px; color: var(--dim); margin-bottom: 16px; }
    .acc-plan-badge { display: inline-block; font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 0.1em; padding: 4px 10px; border: 1px solid; margin-bottom: 24px; }
    .acc-plan-badge.free { color: var(--amber); border-color: var(--amber); }
    .acc-plan-badge.pro { color: var(--blue); border-color: var(--blue); }
    .acc-stats { border: 0.5px solid var(--b2); margin-bottom: 20px; }
    .acc-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .acc-stat-row:last-child { border-bottom: none; }
    .acc-stat-label { color: var(--dim); }
    .acc-stat-val { font-weight: 500; color: var(--white); }
    .acc-btn { width: 100%; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 0.1em; padding: 14px; border: none; cursor: pointer; margin-bottom: 10px; }
    .acc-btn.green { background: var(--blue); color: var(--navy); }
    .acc-btn.outline { background: none; border: 1px solid var(--b2); color: var(--dim); }
    .acc-btn.outline:hover { color: var(--white); border-color: var(--blue-border); }

    /* KILL STRIP */
    #best-bet-strip { background: var(--blue); flex-shrink: 0; }
    .best-bet-strip-inner { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
    .bb-label { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
    .bb-game { font-size: 13px; font-weight: 500; color: #fff; margin-top: 1px; }
    .bb-sub { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 1px; }
    .bb-right { font-size: 10px; font-weight: 500; color: var(--blue); background: #fff; border-radius: 2px; padding: 6px 12px; cursor: pointer; white-space: nowrap; }

    /* BOTTOM NAV */
    #bottom-nav { display: flex; background: var(--navy); border-top: 0.5px solid var(--border); flex-shrink: 0; position: relative; z-index: 20; }
    .bn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 8px 0; cursor: pointer; transition: opacity 0.12s; border: none; background: none; -webkit-tap-highlight-color: transparent; color: var(--white); }
    .bn svg { display: block; opacity: 0.55; }
    .bn span { font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--white); opacity: 0.55; }
    .bn.active span { color: var(--blue); opacity: 1; }
    .bn.active svg { opacity: 1; color: var(--blue); }
    .bn-icon-color { fill: none; stroke: var(--white); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .bn.active .bn-icon-color { stroke: var(--blue); }

    /* FAV BUTTON */
    .fav-btn { background:none; border:none; cursor:pointer; color:var(--b2); padding:4px; transition:color 0.15s; line-height:1; }

/* ── MATH ──────────────────────────────────────────────── */
function fmt(s) { return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

function calcModel(game, secs) {
  const minsPlayed = 48 - secs/60;
  const pace = minsPlayed > 0 ? game.totalSoFar/minsPlayed : 5.1;
  const diff = Math.abs(game.homeScore - game.awayScore);
  const foulAdj = secs<240&&diff<8 ? 1.10 : secs<120&&diff<6 ? 1.18 : 1.0;
  const blowoutDamp = diff>15 ? 0.78 : diff>10 ? 0.88 : 1.0;
  const timeRatio = Math.max(0.15, secs/game.maxSecs);
  const edgeNow = Math.round(game.baseEdge * timeRatio * 10) / 10;
  const modelFair = Math.round((game.marketTotal + edgeNow) * 10) / 10;
  const playableTo = Math.round((modelFair - 1.5) * 2) / 2;
  const conf = Math.min(92, Math.max(48, Math.round(50 + Math.abs(edgeNow) * 3.8)));
  const adjPace = pace * foulAdj * blowoutDamp;
  return { model:modelFair, edge:edgeNow, playableTo, conf, pace:Math.round(adjPace*10)/10 };
}

function projWindow(game, secs, windowSecs) {
  const useSecs = Math.min(windowSecs, secs);
  const minsPlayed = 48 - secs/60;
  const pace = minsPlayed > 0 ? game.totalSoFar/minsPlayed : 5.1;
  const diff = Math.abs(game.homeScore - game.awayScore);
  const foul = secs<240&&diff<8 ? 1.08 : 1.0;
  const blow = diff>15 ? 0.80 : diff>10 ? 0.90 : 1.0;
  const pts = Math.round(pace*(useSecs/60)*foul*blow*10)/10;
  return { pts, lo:Math.round(pts*0.83*10)/10, hi:Math.round(pts*1.17*10)/10 };
}

function getWindows(secs) {
  const m = secs/60, w = [];
  if(m>10){ w.push({l:'3:00',s:180}); w.push({l:'5:00',s:300}); w.push({l:'9:00',s:540}); }
  else if(m>6){ w.push({l:'2:00',s:120}); w.push({l:'3:30',s:210}); w.push({l:'5:00',s:300}); }
  else if(m>3.5){ w.push({l:'1:30',s:90}); w.push({l:'3:00',s:180}); }
  else if(m>1){ w.push({l:'1:00',s:60}); }
  w.push({l:fmt(secs)+' ★',s:secs,full:true});
  return w;
}

function getAltState(secs) {
  const m = secs/60;
  if(m>3.5) return {l:'Full board available',cls:'full'};
  if(m>1.5) return {l:'Lines thinning',cls:'thin'};
  return {l:'Main only · -110 both ways',cls:'gone'};
}

/* ── MLB MATH ──────────────────────────────────────────── */
function getMLBWindows(inningsRemaining) {
  const w = [];
  if (inningsRemaining > 4) { w.push({l:'1 inn',i:1}); w.push({l:'2 inn',i:2}); w.push({l:'3 inn',i:3}); }
  else if (inningsRemaining > 2) { w.push({l:'1 inn',i:1}); w.push({l:'2 inn',i:2}); }
  else if (inningsRemaining > 1) { w.push({l:'1 inn',i:1}); }
  w.push({l: inningsRemaining.toFixed(1) + ' inn ★', i: inningsRemaining, full: true });
  return w;
}

function calcMLBModel(game, inningsRemaining) {
  const inningsPlayed = Math.max(0.5, 9 - inningsRemaining);
  const pace = game.totalSoFar > 0 ? game.totalSoFar / inningsPlayed : 1.0;
  const diff = Math.abs((game.homeScore||0) - (game.awayScore||0));
  const lateDamp = inningsRemaining <= 2 ? 0.82 : inningsRemaining <= 3 ? 0.90 : 1.0;
  const blowDamp = diff > 5 ? 0.72 : diff > 3 ? 0.85 : 1.0;
  const timeRatio = Math.max(0.15, inningsRemaining / 9);
  const edgeNow = Math.round((game.baseEdge || 0) * timeRatio * 10) / 10;
  const modelFair = Math.round(((game.marketTotal || 8.5) + edgeNow) * 10) / 10;
  const playableTo = Math.round((modelFair - 0.5) * 2) / 2;
  const conf = Math.min(88, Math.max(48, Math.round(50 + Math.abs(edgeNow) * 4.2)));
  const adjPace = pace * lateDamp * blowDamp;
  return { model: modelFair, edge: edgeNow, playableTo, conf, pace: Math.round(adjPace * 10) / 10 };
}

function projMLBWindow(game, inningsRemaining, windowInnings) {
  const useInnings = Math.min(windowInnings, inningsRemaining);
  const inningsPlayed = Math.max(0.5, 9 - inningsRemaining);
  const pace = game.totalSoFar > 0 ? game.totalSoFar / inningsPlayed : 1.0;
  const diff = Math.abs((game.homeScore||0) - (game.awayScore||0));
  const late = inningsRemaining <= 2 ? 0.82 : 1.0;
  const blow = diff > 5 ? 0.72 : diff > 3 ? 0.85 : 1.0;
  const runs = Math.round(pace * useInnings * late * blow * 10) / 10;
  return { pts: runs, lo: Math.round(runs * 0.70 * 10) / 10, hi: Math.round(runs * 1.30 * 10) / 10 };
}

function getMLBAltState(inningsRemaining) {
  if (inningsRemaining > 2) return { l:'Full board available', cls:'full' };
  if (inningsRemaining > 1) return { l:'Lines thinning', cls:'thin' };
  return { l:'Main only · -110 both ways', cls:'gone' };
}

function renderNewsItems(sport) {
  const el = document.getElementById('news-content');
  if (!el) return;
  const items = window.__newsItems || [];
  const filtered = sport === 'all' ? items : items.filter(item => {
    const s = (item.sport || '').toLowerCase();
    return s === sport;
  });
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-title">No ${sport === 'all' ? '' : sport.toUpperCase() + ' '}news right now</div></div>`;
    return;
  }
  el.innerHTML = '<div style="padding:6px 0;">' + filtered.map(item => {
    const age = timeAgo(new Date(item.pubDate));
    const tl = (item.title || '').toLowerCase();
    const isBreaking = tl.includes('injury') || tl.includes('questionable') || tl.includes('out ') || tl.includes('suspended');
    return `<a class="news-card ${isBreaking ? 'breaking' : ''}" href="${item.link}" target="_blank" rel="noopener" style="display:block;text-decoration:none;color:inherit;">
      <div class="news-meta">
        <span class="news-sport">${item.sport}</span>
        <span class="news-age">${age}</span>
        ${isBreaking ? '<span class="news-breaking">INJURY/OUT</span>' : ''}
      </div>
      <div class="news-title">${item.title}</div>
      ${item.description ? `<div class="news-desc">${item.description.slice(0, 120)}${item.description.length > 120 ? '…' : ''}</div>` : ''}
      <div class="news-arrow">→</div>
    </a>`;
  }).join('') + '</div>';
}

function timeAgo(date) {
  const mins = Math.round((Date.now() - date) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.round(hrs / 24) + 'd ago';
}

function toggleFav(id) {
  if (!window.__favs) window.__favs = {};
  window.__favs[id] = !window.__favs[id];
  renderBoard();
}

/* ── HOME / BOARD ───────────────────────────────────────── */
function switchHomeTab(t) {
  homeTab = t;
  renderHomeContent();
}

function switchSportTab(sport) {
  activeSportTab = sport;
  document.querySelectorAll('#home-tabs .tab').forEach(t => t.classList.remove('active'));
  const btn = document.getElementById('tab-' + sport);
  if (btn) btn.classList.add('active');
  renderHomeContent();
}

function getGameById(id) {
  if (window.__liveGames) {
    const lg = window.__liveGames.find(g => g.id === id);
    if (lg) return liveGameToCard(lg);
  }
  return GAMES[id] || null;
}

function getAllGames() {
  if (window.__liveGames && window.__liveGames.length > 0) {
    return window.__liveGames.map(liveGameToCard);
  }
  return Object.values(GAMES);
}

function renderHomeContent() {
  const el = document.getElementById('home-content');
  const allGames = getAllGames();

  const filterBySport = (games) => {
    if (activeSportTab === 'all') return games;
    if (activeSportTab === 'nba') return games.filter(g => !g.isMLB && (g.sport === 'NBA' || !g.sport));
    if (activeSportTab === 'mlb') return games.filter(g => g.isMLB || g.sport === 'MLB');
    return games;
  };

  const live = filterBySport(allGames.filter(g => g.status === 'live'));
  const upcoming = filterBySport(allGames.filter(g => g.status !== 'live'));

  const liveAll = allGames.filter(g => g.status === 'live');
  const liveCountWrap = document.getElementById('live-count-wrap');
  if (liveAll.length > 0) {
    document.getElementById('live-count-label').textContent = liveAll.length + ' LIVE';
    liveCountWrap.style.display = 'flex';
  } else {
    liveCountWrap.style.display = 'none';
  }

  let html = '';
  if (live.length) {
    html += '<div class="section-label">Live Now</div>' + live.map(gameCardHTML).join('');
  }
  if (upcoming.length) {
    html += '<div class="section-label">Upcoming</div>' + upcoming.map(gameCardHTML).join('');
  }
  if (!live.length && !upcoming.length) {
    const sportName = activeSportTab === 'all' ? '' : activeSportTab.toUpperCase() + ' ';
    html = `<div class="empty-state"><div class="empty-title">No ${sportName}games right now</div><div class="empty-sub">Check back when games are scheduled.</div></div>`;

function gameCardHTML(g) {
  const m = calcModel(g, g.secsRemaining);
  const isPregame = g.baseEdge === 0;
  const innings = g.inningsRemaining || 9;
  const wins = g.isMLB ? getMLBWindows(innings) : getWindows(g.secsRemaining);
  const diff = Math.abs(g.homeScore - g.awayScore);
  const minsPlayed = 48 - g.secsRemaining/60;
  const pace = minsPlayed > 0 ? g.totalSoFar/minsPlayed : 5.1;

  // Verdict logic
  let verdictText, verdictClass, edgeClass;
  if (isPregame) {
    verdictText = 'Edge calculates when live';
    verdictClass = 'gc-verdict-pregame';
    edgeClass = '';
  } else if (m.edge >= 3) {
    verdictText = 'BET OVER ' + g.marketTotal;
    verdictClass = 'gc-verdict-over';
    edgeClass = 'edge-over';
  } else if (m.edge > 0 && m.edge < 3) {
    verdictText = 'WAIT';
    verdictClass = 'gc-verdict-wait';
    edgeClass = 'edge-wait';
  } else if (m.edge < 0 && m.edge > -3) {
    verdictText = 'WAIT';
    verdictClass = 'gc-verdict-wait';
    edgeClass = 'edge-wait';
  } else {
    verdictText = 'AVOID OVER ' + g.marketTotal;
    verdictClass = 'gc-verdict-avoid';
    edgeClass = 'edge-under';
  }

  // One-line why
  let why;
  if (pace > 5.5) why = 'Pace elevated · scoring window open';
  else if (pace < 4.5) why = 'Pace stalled · scoring window closing';
  else if (diff > 15) why = 'Blowout risk · garbage time likely';
  else if (g.secsRemaining < 240 && diff < 8) why = 'Foul risk elevated · free throws incoming';
  else why = 'Model vs market divergence';

  const edgeSign = m.edge >= 0 ? '+' : '';
  const edgeNumClass = m.edge >= 3 ? 'gc-verdict-over' : m.edge <= -3 ? 'gc-verdict-avoid' : 'gc-verdict-wait';
  const isLive = g.status === 'live';
  const sport = g.sport || (g.isMLB ? 'MLB' : 'NBA');
  const clockPart = g.clock ? ` ${g.period} ${g.clock}` : ` ${g.period}`;
  const isFav = !!(window.__favs && window.__favs[g.id]);

  return `<div class="game-card ${edgeClass}" onclick="openGameView('${g.id}')">
    <div class="gc-meta">
      <span>${isLive ? '<span class="gc-live-dot"></span><span class="gc-meta-live">Live</span> · ' : ''}${sport} ·${clockPart}</span>
      <span class="gc-fav">
        <button class="fav-btn${isFav?' on':''}" onclick="event.stopPropagation();toggleFav('${g.id}')" title="Favorite">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="1.4"><path d="M7 1l1.5 3 3.5.5-2.5 2.5.5 3.5L7 9l-3 1.5.5-3.5L2 4.5 5.5 4z" stroke-linejoin="round"/></svg>
        </button>
      </span>
    </div>
    <div class="gc-teams">${g.away} vs ${g.home}</div>
    <div class="gc-score-total">
      <div class="gc-score-block">
        <span class="gc-score-lbl">Score</span>
        <span class="gc-score-val">${g.awayScore} – ${g.homeScore}</span>
      </div>
      <div class="gc-total-block">
        <span class="gc-total-lbl">O/U</span>
        <span class="gc-total-num">${g.marketTotal}</span>
        <span class="gc-total-book">DraftKings</span>
      </div>
    </div>
    <div class="gc-verdict-row">
      <div>
        <div class="gc-verdict ${verdictClass}">${verdictText}</div>
        <div class="gc-why">${why}</div>
      </div>
      ${!isPregame ? `<div class="gc-edge-col">
        <span class="gc-edge-num ${edgeNumClass}">${edgeSign}${m.edge}</span>
        <span class="gc-edge-lbl">model edge</span>
      </div>` : ''}
    </div>
    ${!isPregame ? `
    <div class="gc-projections">
      ${wins.slice(0, 2).map(w => {
        const p = g.isMLB
          ? projMLBWindow(g, innings, w.i || w.s/600)
          : projWindow(g, g.secsRemaining, w.s);
        const unit = g.isMLB ? 'runs' : 'pts';
        return `<div class="gc-proj-item">
          <span class="gc-proj-label">Next ${w.l}</span>
          <span class="gc-proj-val">${p.pts} ${unit}</span>
        </div>`;
      }).join('')}
      <div class="gc-proj-item">
        <span class="gc-proj-label">Playable to</span>
        <span class="gc-proj-val gc-proj-playable">${m.playableTo}</span>
      </div>
    </div>
    ` : ''}
    ${!isPregame && Math.abs(m.edge) >= 3 ? `
    <div class="gc-bet-now" onclick="event.stopPropagation();openBetNow(${JSON.stringify({isMLB: g.isMLB || false})})">
      <span class="gc-bet-now-label">Bet Now</span>
      <span class="gc-bet-now-book">${(SPORTSBOOK_LINKS[getSportsbookPref()] || SPORTSBOOK_LINKS.draftkings).name} →</span>
    </div>
    ` : ''}
  </div>`;
}

/* ── KILL STRIP ─────────────────────────────────────────── */
let bestBetGameId = null;

function updateBestBet(games) {
  const liveGames = games.filter(g => g.status === 'live' && g.baseEdge !== 0);
  const strip = document.getElementById('best-bet-strip');
  if (!liveGames.length) {
    strip.style.display = 'none';
    document.querySelectorAll('.scr').forEach(s => s.style.paddingBottom = '56px');
    return;
  }
  const best = liveGames.reduce((a, b) => {
    const aM = calcModel(a, a.secsRemaining);
    const bM = calcModel(b, b.secsRemaining);
    return Math.abs(bM.edge) > Math.abs(aM.edge) ? b : a;
  });
  const m = calcModel(best, best.secsRemaining);
  if (Math.abs(m.edge) < 3) {
    strip.style.display = 'none';
    document.querySelectorAll('.scr').forEach(s => s.style.paddingBottom = '56px');
    return;
  }
  bestBetGameId = best.id;
  const side = m.edge >= 0 ? 'OVER' : 'UNDER';
  document.getElementById('bb-game').textContent = best.away + ' vs ' + best.home + ' · ' + side + ' ' + best.marketTotal;
  document.getElementById('bb-sub').textContent = '+' + Math.abs(m.edge) + ' edge · ' + getBestBetReason(best, m);
  strip.style.display = 'block';
  document.querySelectorAll('.scr').forEach(s => s.style.paddingBottom = '110px');
}

function getBestBetReason(g, m) {
  const diff = Math.abs(g.homeScore - g.awayScore);
  if (m.pace > 5.5) return 'pace elevated';
  if (m.pace < 4.5) return 'pace stalled';
  if (diff > 15) return 'blowout risk';
  if (g.secsRemaining < 240 && diff < 8) return 'foul risk';
  return 'model divergence';
}

function openBestBet() {
  if (bestBetGameId) openGameView(bestBetGameId);
}

/* ── GAME VIEW ──────────────────────────────────────────── */

  activeGame = getGameById(gameId) || GAMES[gameId];

    <div id="game-tab-content"></div>
  `;

  renderGameTabContent();

function switchGameTab(t) {
  activeTab = t;

  document.getElementById('gtab-box').classList.toggle('active', t === 'box');
  renderGameTabContent();
}

function renderGameTabContent() {
  const el = document.getElementById('game-tab-content');
  if (!el) return;
  if (activeTab === 'edge') renderEdgeTab(el);
  else renderBoxTab(el);
}

function renderEdgeTab(el) {
  const g = activeGame;

  if (g.isMLB) {
    renderMLBEdgeTab(el, g);
    return;
  }

  const secs = activeGameSecs;
  const m = calcModel(g, secs);
  const wins = getWindows(secs);
  const alt = getAltState(secs);
  const edgeColor = m.edge >= 0 ? 'green' : 'red';
  const edgeSign = m.edge >= 0 ? '+' : '';
  const confColor = m.conf >= 70 ? 'green' : 'amber';

  if (activeWinIdx >= wins.length) activeWinIdx = wins.length - 1;
  const selWin = wins[activeWinIdx];
  const selProj = projWindow(g, secs, selWin.s);

  const winTabsHtml = wins.map((w, i) =>
    `<button class="win-tab${i===activeWinIdx?' active':''}" onclick="selectWindow(${i})">${w.l}</button>`
  ).join('');

  const chartW = 280, chartH = 52, pts = 8;
  const modelStart = g.marketTotal + g.baseEdge;
  const svgPoints = Array.from({length:pts}, (_,i) => {
    const x = Math.round((i/(pts-1)) * chartW);
    const marketY = Math.round(chartH/2);
    const mY = Math.round(chartH/2 - (modelStart - g.marketTotal) * (i/(pts-1)) * 1.2);
    return { x, marketY, modelY: Math.min(chartH-2, Math.max(2, mY)) };
  });
  const marketPath = svgPoints.map((p,i) => `${i?'L':'M'}${p.x},${p.marketY}`).join(' ');
  const modelPath = svgPoints.map((p,i) => `${i?'L':'M'}${p.x},${p.modelY}`).join(' ');
  const nowX = Math.round(chartW * (1 - secs/g.maxSecs));

  el.innerHTML = `
    <div class="edge-tab-content">
      <div class="clock-strip">
        <span class="clock-label">Clock</span>
        <input type="range" class="clock-slider" min="0" max="${g.maxSecs}" value="${secs}" oninput="onClockSlide(this.value)">
        <span class="clock-display" id="clock-disp">${fmt(secs)}</span>
      </div>
      <div class="edge-hero">
        <div class="eh-row1">
          <div><div class="eh-col-label">Score</div><div class="eh-score-val">${g.awayScore}–${g.homeScore}</div></div>
          <div><div class="eh-col-label">Market</div><div class="eh-market-val">${g.marketTotal}</div></div>
          <div><div class="eh-col-label">Model</div><div class="eh-model-val ${edgeColor}" id="model-val">${m.model}</div></div>
        </div>
        <div class="eh-edge">
          <div class="eh-edge-num ${edgeColor}" id="edge-num">EDGE: ${edgeSign}${m.edge} ${g.side}</div>
          <div class="eh-playable">Over playable to: <span id="playable-to">${m.playableTo}</span></div>
        </div>
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-bar-header">
          <span class="conf-bar-label">Confidence</span>
          <span class="conf-bar-pct" id="conf-pct" style="color:var(--${confColor})">${m.conf}%</span>
        </div>
        <div class="conf-bar-bg"><div class="conf-bar-fill ${confColor}" id="conf-fill" style="width:${m.conf}%"></div></div>
      </div>
      <div class="market-chart">
        <div class="market-chart-label">Market vs Model</div>
        <svg width="${chartW}" height="${chartH}" viewBox="0 0 ${chartW} ${chartH}" style="display:block;border:0.5px solid var(--border);background:var(--s1);">
          <path d="${marketPath}" stroke="#e8f2fb" stroke-width="1.5" fill="none" opacity="0.25"/>
          <path d="${modelPath}" stroke="${m.edge>=0?'#4da6ff':'#ff5a52'}" stroke-width="1.5" fill="none"/>
          <line x1="${nowX}" y1="0" x2="${nowX}" y2="${chartH}" stroke="#4a6480" stroke-width="1" stroke-dasharray="3,3"/>
          <text x="4" y="10" font-size="7" fill="#4a6480" font-family="DM Sans">Market</text>
          <text x="4" y="20" font-size="7" fill="${m.edge>=0?'#4da6ff':'#ff5a52'}" font-family="DM Sans">Model</text>
        </svg>
      </div>
      <div class="windows-section">
        <div class="ws-label">Next window projections</div>
        <div class="win-tabs" id="win-tabs">${winTabsHtml}</div>
        <div class="win-detail" id="win-detail">
          <div class="wd-pts">${selProj.pts} pts</div>
          <div class="wd-range">Range: ${selProj.lo} – ${selProj.hi}</div>
          <div class="wd-note">${selWin.full ? 'Full remaining game' : 'Isolated window projection'}</div>
        </div>
      </div>
      <div class="alt-line ${alt.cls}" id="alt-line">${alt.l}</div>
      <div class="signals-section">
        <div class="sig-row"><span class="sig-name">Pace</span><span class="sig-val ${m.pace>5.5?'green':m.pace<4.5?'red':'amber'}">${m.pace>5.5?'HIGH ↑':m.pace<4.5?'LOW ↓':'MODERATE'}</span></div>
        <div class="sig-row"><span class="sig-name">Foul environment</span><span class="sig-val ${secs<240&&Math.abs(g.homeScore-g.awayScore)<8?'amber':'green'}">${secs<240&&Math.abs(g.homeScore-g.awayScore)<8?'ACTIVE':'NORMAL'}</span></div>
        <div class="sig-row"><span class="sig-name">Timeout risk</span><span class="sig-val amber">MEDIUM</span></div>
        <div class="sig-row"><span class="sig-name">Blowout risk</span><span class="sig-val ${Math.abs(g.homeScore-g.awayScore)>15?'red':'green'}">${Math.abs(g.homeScore-g.awayScore)>15?'HIGH':'LOW'}</span></div>
        <div class="sig-row"><span class="sig-name">Garbage time</span><span class="sig-val ${Math.abs(g.homeScore-g.awayScore)>20?'amber':'green'}">${Math.abs(g.homeScore-g.awayScore)>20?'MODERATE RISK':'LOW'}</span></div>
      </div>
      <div class="action-block">
        <div class="ab-playable">Over playable to: <span style="color:var(--blue)" id="ab-playable">${m.playableTo}</span></div>

          <button class="ab-btn" onclick="openAlertModal('${g.id}')">Alert</button>
          <button class="ab-btn danger" onclick="openSnapshot()">Share</button>
        </div>
      </div>
    </div>
  `;
}

function onClockSlide(val) {
  activeGameSecs = parseInt(val);
  const g = activeGame;
  const secs = activeGameSecs;
  const m = calcModel(g, secs);
  const edgeColor = m.edge >= 0 ? 'green' : 'red';
  const edgeSign = m.edge >= 0 ? '+' : '';
  const confColor = m.conf >= 70 ? 'green' : 'amber';
  const alt = getAltState(secs);

  const cd = document.getElementById('clock-disp');
  const mv = document.getElementById('model-val');
  const en = document.getElementById('edge-num');
  const pt = document.getElementById('playable-to');
  const abp = document.getElementById('ab-playable');
  const cp = document.getElementById('conf-pct');
  const cf = document.getElementById('conf-fill');
  const al = document.getElementById('alt-line');

  if (cd) cd.textContent = fmt(secs);
  if (mv) { mv.textContent = m.model; mv.className = 'eh-model-val ' + edgeColor; }
  if (en) { en.textContent = `EDGE: ${edgeSign}${m.edge} ${g.side}`; en.className = 'eh-edge-num ' + edgeColor; }
  if (pt) pt.textContent = m.playableTo;
  if (abp) abp.textContent = m.playableTo;
  if (cp) { cp.textContent = m.conf + '%'; cp.style.color = `var(--${confColor})`; }
  if (cf) { cf.style.width = m.conf + '%'; cf.className = 'conf-bar-fill ' + confColor; }
  if (al) { al.textContent = alt.l; al.className = 'alt-line ' + alt.cls; }

  // Update window tabs
  const wins = getWindows(secs);
  if (activeWinIdx >= wins.length) activeWinIdx = wins.length - 1;
  const wt = document.getElementById('win-tabs');
  const wd = document.getElementById('win-detail');
  if (wt) wt.innerHTML = wins.map((w,i) => `<button class="win-tab${i===activeWinIdx?' active':''}" onclick="selectWindow(${i})">${w.l}</button>`).join('');
  if (wd) {
    const sel = wins[activeWinIdx];
    const p = projWindow(g, secs, sel.s);
    wd.innerHTML = `<div class="wd-pts">${p.pts} pts</div><div class="wd-range">Range: ${p.lo} – ${p.hi}</div><div class="wd-note">${sel.full?'Full remaining game':'Isolated window projection'}</div>`;
  }
}

function onInningSlide(val) {
  const innings = parseFloat(val);
  if (activeGame) activeGame.inningsRemaining = innings;
  const g = activeGame;
  const m = calcMLBModel(g, innings);
  const edgeColor = m.edge >= 0 ? 'green' : 'red';
  const edgeSign = m.edge >= 0 ? '+' : '';
  const confColor = m.conf >= 70 ? 'green' : 'amber';
  const alt = getMLBAltState(innings);
  const cd = document.getElementById('clock-disp');
  const mv = document.getElementById('model-val');
  const en = document.getElementById('edge-num');
  const pt = document.getElementById('playable-to');
  const abp = document.getElementById('ab-playable');
  const cp = document.getElementById('conf-pct');
  const cf = document.getElementById('conf-fill');
  const al = document.getElementById('alt-line');
  if (cd) cd.textContent = innings.toFixed(1);
  if (mv) { mv.textContent = m.model; mv.className = 'eh-model-val ' + edgeColor; }
  if (en) { en.textContent = `EDGE: ${edgeSign}${m.edge} ${g.side}`; en.className = 'eh-edge-num ' + edgeColor; }
  if (pt) pt.textContent = m.playableTo;
  if (abp) abp.textContent = m.playableTo;
  if (cp) { cp.textContent = m.conf + '%'; cp.style.color = `var(--${confColor})`; }
  if (cf) { cf.style.width = m.conf + '%'; cf.className = 'conf-bar-fill ' + confColor; }
  if (al) { al.textContent = alt.l; al.className = 'alt-line ' + alt.cls; }
  const wins = getMLBWindows(innings);
  if (activeWinIdx >= wins.length) activeWinIdx = wins.length - 1;
  const wt = document.getElementById('win-tabs');
  const wd = document.getElementById('win-detail');
  if (wt) wt.innerHTML = wins.map((w,i) => `<button class="win-tab${i===activeWinIdx?' active':''}" onclick="selectWindow(${i})">${w.l}</button>`).join('');
  if (wd) {
    const sel = wins[activeWinIdx];
    const p = projMLBWindow(g, innings, sel.i);
    wd.innerHTML = `<div class="wd-pts">${p.pts} runs</div><div class="wd-range">Range: ${p.lo} – ${p.hi}</div><div class="wd-note">${sel.full?'Full remaining game':'Isolated inning window'}</div>`;
  }
}

function selectWindow(idx) {
  activeWinIdx = idx;
  document.querySelectorAll('.win-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  const wd = document.getElementById('win-detail');
  if (!wd) return;
  if (activeGame?.isMLB) {
    const innings = activeGame.inningsRemaining || 9;
    const wins = getMLBWindows(innings);
    const sel = wins[idx];
    if (!sel) return;
    const p = projMLBWindow(activeGame, innings, sel.i);
    wd.innerHTML = `<div class="wd-pts">${p.pts} runs</div><div class="wd-range">Range: ${p.lo} – ${p.hi}</div><div class="wd-note">${sel.full?'Full remaining game':'Isolated inning window'}</div>`;
  } else {
    const wins = getWindows(activeGameSecs);
    const sel = wins[idx];
    if (!sel) return;
    const p = projWindow(activeGame, activeGameSecs, sel.s);
    wd.innerHTML = `<div class="wd-pts">${p.pts} pts</div><div class="wd-range">Range: ${p.lo} – ${p.hi}</div><div class="wd-note">${sel.full?'Full remaining game':'Isolated window projection'}</div>`;
  }
}

function renderBoxTab(el) {

  const awayPitcher = g.awayPitcher || { name: 'Starter', ip: '—', h: '—', er: '—', k: '—', bb: '—' };
  const homePitcher = g.homePitcher || { name: 'Starter', ip: '—', h: '—', er: '—', k: '—', bb: '—' };

  function pitcherRow(p) {
    return `<div class="bs-row" style="grid-template-columns: 1fr 36px 36px 36px 36px 36px;">

      <div class="bs-name">${b.name} <span class="bs-pos">${b.pos || ''}</span>${b.hot ? '<span class="hot-pill">HOT</span>' : ''}</div>

    <div>Pitcher</div><div>IP</div><div>H</div><div>ER</div><div>K</div><div>BB</div>
  </div>`;

  const colHeadersBatting = `<div class="bs-col-headers" style="grid-template-columns: 1fr 36px 36px 36px 36px 36px;">
    <div>Batter</div><div>AB</div><div>H</div><div>R</div><div>RBI</div><div>HR</div>
  </div>`;

  el.innerHTML = `<div class="bs-content">

    ${colHeadersPitching}

/* ── RUN ANALYSIS ───────────────────────────────────────── */
async function runAnalysis(game, prop) {
  const payload = {
    playerName: prop.playerName, sport: 'NBA',
    statType: prop.statType, currentStat: prop.currentStat,
    propLine: prop.line, period: game.period,
    timeRemaining: game.clock, homeScore: game.homeScore,
    awayScore: game.awayScore,
  };
  try {
    const r = await fetch('/api/liveunder', {
      method:'POST', headers:{'Content-Type':'application/json'},
      credentials:'include', body: JSON.stringify(payload)
    });
    const data = await r.json();
    if (r.status === 401) { showUpgradeBanner('Sign in to run full analysis'); return; }
    if (data.limitReached) { showUpgradeBanner('Upgrade to Pro for unlimited analyses'); return; }
    return data;
  } catch(e) { return null; }
}

    const m = calcModel(g, g.secsRemaining);
    const sign = m.edge >= 0 ? '+' : '';
    alerts.push({ gameId, title: g.title, msg: `Edge: ${sign}${m.edge} ${g.side}`, color: g.edgeColor, time: 'Just now' });
  }
  closeModal();
  showConfirmModal('🔔', 'Alert Set', `We'll notify you when the edge threshold is crossed.`);
}

function showModal(html) {
  const layer = document.getElementById('modal-layer');
  layer.innerHTML = `<div class="modal-overlay open" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}

function showConfirmModal(icon, title, msg) {
  const layer = document.getElementById('modal-layer');
  layer.innerHTML = `<div class="modal-overlay open confirm-modal" onclick="if(event.target===this)closeModal()"><div class="modal"><span class="confirm-icon">${icon}</span><div class="confirm-title">${title}</div><div class="confirm-msg">${msg}</div><button class="modal-btn primary" style="width:100%;" onclick="closeModal()">Done</button></div></div>`;
}

function closeModal() {
  document.getElementById('modal-layer').innerHTML = '';
}

    const r = await fetch('/api/odds/live-games', { credentials:'include' });

    if (d.games && d.games.length > 0) {
      window.__liveGames = d.games;

      window.__liveGames = null;

}

function liveGameToCard(g) {
  const now = new Date();
  const commence = new Date(g.commenceTime);
  const diffMins = (commence - now) / (1000 * 60);
  let periodLabel, clockLabel;
  if (g.status === 'live') {
    periodLabel = 'LIVE'; clockLabel = '';
  } else if (diffMins < 60) {
    periodLabel = 'Starting soon'; clockLabel = Math.round(diffMins) + ' min';
  } else {
    periodLabel = commence.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short' });
    clockLabel = '';
  }
  const isMLB = g.sport === 'MLB';
  const base = {
    id: g.id,
    title: g.awayTeam + ' @ ' + g.homeTeam,
    sport: g.sport || 'NBA',
    away: g.awayAbbr, home: g.homeAbbr,
    awayScore: '–', homeScore: '–',
    awayRec: '', homeRec: '',
    period: periodLabel, clock: clockLabel,
    totalSoFar: 0, marketTotal: g.marketTotal,
    baseEdge: 0, side: 'TBD',
    edgeColor: 'var(--dim)',
    badge: g.status === 'live' ? 'LIVE' : 'PREGAME',
    network: g.sport || '',
    status: g.status,
    books: g.books,
    qtrs: [], awayPlayers: [], homePlayers: [],
    isLive: false,
  };
  if (isMLB) {
    return { ...base, isMLB: true, currentInning: 1, isBottom: false,
      inningsRemaining: 9, maxSecs: 9, secsRemaining: 9,
      awayPitcher: { name: 'Starting Pitcher', ip: '—', h: '—', er: '—', k: '—', bb: '—', hot: false },
      homePitcher: { name: 'Starting Pitcher', ip: '—', h: '—', er: '—', k: '—', bb: '—', hot: false },
      awayBatters: [], homeBatters: [],
    };
  }
  return { ...base, isMLB: false, maxSecs: 720, secsRemaining: 720 };
}

  showBoardTabs();
  const games = getAllGames();
  updateBestBet(games);
  renderHomeContent();
