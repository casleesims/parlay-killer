<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Pro — Parlay Killer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #080808;
      --green: #00ff87;
      --white: #ffffff;
      --dim:   #999999;
      --font:  'Barlow Condensed', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      text-align: center;
      max-width: 440px;
      width: 100%;
    }

    .check {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(0,255,135,0.1);
      border: 2px solid var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 2rem;
      color: var(--green);
    }

    .title {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 6px;
    }

    .title span { color: var(--green); }

    .sub {
      font-size: 1rem;
      font-weight: 400;
      color: var(--dim);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .cta {
      display: inline-block;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--green);
      color: #000;
      padding: 14px 36px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .cta:hover { opacity: 0.88; }

    .logo {
      display: block;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--green);
      text-decoration: none;
      margin-top: 36px;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .logo:hover { opacity: 1; }
  </style>
  <!-- Google Analytics placeholder - replace G-XXXXXXXXXX with real ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <div class="title">You're now <span>Pro</span></div>
    <p class="sub">Unlimited analyses, every day. The math the sportsbook doesn't want you to see — no limits.</p>
    <a href="/" class="cta">Start Analyzing Unlimited Parlays</a>
    <a href="/" class="logo">Parlay Killer</a>
  </div>
</body>
</html>
